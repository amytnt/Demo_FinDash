<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Life Map — Financial Planning</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin/>
<style>
/* Loading screen — shows instantly before any JS loads */
#loading-screen{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#fef9f4 0%,#fff5ee 40%,#f8f0e8 100%);transition:opacity 0.4s ease}
#loading-screen.fade-out{opacity:0;pointer-events:none}
#loading-screen svg{margin-bottom:20px}
#loading-screen h2{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-size:20px;font-weight:800;color:#1b1b1b;letter-spacing:-0.3px;margin-bottom:6px}
#loading-screen p{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-size:12px;color:#888}
.loader-dots{display:flex;gap:6px;margin-top:20px}
.loader-dots span{width:8px;height:8px;border-radius:50%;background:#005451;opacity:0.3;animation:dotPulse 1.2s infinite}
.loader-dots span:nth-child(2){animation-delay:0.2s}
.loader-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dotPulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1.1)}}
</style>
<style>
:root{--teal:#005451;--teal-light:#3d8b87;--teal-bg:#e8f4f3;--red:#c23030;--coral:#B55B64;--dark:#1b1b1b;--grey:#666;--light:#f5f6f7;--bg:#f0f2f5;--card:#fff;--border:#eee;--input-border:#ccc;--gold:#D4A843;--tab-bg:#e0e0e0;--tab-text:#333;--table-border:#eee;--planner-border:#ddd}
[data-theme="dark"]{--teal:#4db8b3;--teal-light:#6dcfc9;--teal-bg:#1a2f2e;--red:#f06060;--coral:#e07080;--dark:#e8e8e8;--grey:#999;--light:#1e2124;--bg:#0f1114;--card:#1a1d21;--border:#2a2e33;--input-border:#3a3f45;--gold:#f0c060;--tab-bg:#2a2e33;--tab-text:#ccc;--table-border:#2a2e33;--planner-border:#3a3f45}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--dark);font-size:13px;line-height:1.5}

/* Summary bar */
.summary-bar{background:linear-gradient(135deg,#005451,#007a75);color:#fff;padding:16px 20px;display:flex;align-items:center;flex-wrap:wrap;gap:0;box-shadow:0 4px 20px rgba(0,84,81,0.3);border-radius:0;transition:padding 0.3s ease,box-shadow 0.3s ease}
.summary-bar.bar-mini{padding:3px 10px;box-shadow:0 1px 4px rgba(0,84,81,0.1);border-radius:0 0 6px 6px}
.summary-bar.bar-mini .summary-item{padding:1px 6px;display:flex;flex-direction:row;align-items:center;gap:4px;text-align:left}
.summary-bar.bar-mini .sl{font-size:7px;margin-bottom:0}
.summary-bar.bar-mini .sv{font-size:11px;min-height:auto}
.summary-bar.bar-mini .summary-help{width:14px;height:14px;font-size:7px}
.summary-bar.bar-mini .si-sub{display:none}
[data-theme="dark"] .summary-bar{background:linear-gradient(135deg,#003d3b,#005451);box-shadow:0 2px 12px rgba(0,0,0,0.4)}
.summary-item{flex:1 1 0;min-width:100px;text-align:center;padding:6px 8px;border-right:1px solid rgba(255,255,255,0.15);transition:padding 0.3s ease}
.summary-item:last-of-type{border-right:none}
.summary-item .sl{font-size:clamp(7px,0.6vw,9px);text-transform:uppercase;letter-spacing:0.5px;opacity:0.7;margin-bottom:2px;white-space:nowrap;transition:font-size 0.3s ease}
.summary-item .sv{font-size:clamp(18px,1.8vw,28px);font-weight:800;font-variant-numeric:tabular-nums;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:32px;display:flex;align-items:center;justify-content:center;transition:font-size 0.3s ease,min-height 0.3s ease;letter-spacing:-0.5px}
.summary-item .si-sub{font-size:clamp(7px,0.55vw,9px);opacity:0;line-height:1.2;margin-top:3px;animation:legendFadeIn 0.4s ease forwards}
@keyframes legendFadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:0.65;transform:translateY(0)}}
.summary-help{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.1);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.summary-help:hover{background:rgba(255,255,255,0.25);border-color:rgba(255,255,255,0.7)}

/* Progress */
.progress-strip{display:flex;gap:8px;align-items:center;padding:12px 20px;background:var(--card);border-radius:14px;margin-bottom:16px;border:1px solid var(--border)}
.progress-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid var(--border);background:var(--light);transition:all 0.3s}
.progress-dot.done{background:var(--teal);border-color:var(--teal);color:#fff}
.progress-dot.active{border-color:var(--teal);color:var(--teal);animation:pulse 1.5s infinite}
.progress-dot.empty{opacity:0.4}
.progress-label{font-size:10px;color:var(--grey);margin-left:8px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,84,81,0.3)}50%{box-shadow:0 0 0 5px rgba(0,84,81,0)}}

/* Layout */
.app-layout{display:grid;grid-template-columns:380px 1fr;gap:24px;padding:24px;max-width:1600px;margin:0 auto;transition:grid-template-columns 0.35s cubic-bezier(0.4,0,0.2,1)}
.app-layout.collapsed{grid-template-columns:52px 1fr;gap:12px}
@media(max-width:900px){.app-layout{grid-template-columns:1fr}.app-layout.collapsed{grid-template-columns:1fr}.left-panel{display:none}.left-panel.mobile-open{display:flex}.mobile-toggle{display:flex !important}.icon-strip{display:none}.summary-bar{padding:8px 10px;border-radius:0}.summary-item{min-width:80px;padding:4px 6px;border-right:none}.summary-item .sv{font-size:14px}.metrics-grid{grid-template-columns:repeat(2,1fr)}}
.left-panel{display:flex;flex-direction:column;gap:16px;overflow-y:auto;max-height:calc(100vh - 180px);transition:opacity 0.3s ease,transform 0.35s cubic-bezier(0.4,0,0.2,1);transform-origin:left center}
.left-panel.panel-hidden{opacity:0;transform:translateX(-20px);pointer-events:none;overflow:hidden;width:0;min-width:0;padding:0;margin:0}
.right-panel{display:flex;flex-direction:column;gap:20px;overflow-y:auto;max-height:calc(100vh - 180px)}
.panel-toggle{display:none}

/* Icon strip (collapsed sidebar) */
.icon-strip{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 0;background:var(--card);border-radius:14px;border:1px solid var(--border);position:sticky;top:16px}
.icon-strip-btn{width:40px;height:40px;border-radius:10px;border:none;background:transparent;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:var(--grey);position:relative}
.icon-strip-btn:hover{background:var(--teal-bg);color:var(--teal);transform:scale(1.1)}
.icon-strip-btn:active{transform:scale(0.95)}
.icon-strip-btn.expand-btn{font-size:12px;color:var(--teal);border-top:1px solid var(--border);margin-top:4px;padding-top:4px;width:100%;border-radius:0 0 14px 14px}
.icon-strip-btn.expand-btn:hover{background:var(--teal-bg)}
.icon-strip-tooltip{position:absolute;left:48px;top:50%;transform:translateY(-50%);background:var(--dark);color:#fff;font-size:10px;font-weight:600;padding:4px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.15s;z-index:10}
.icon-strip-btn:hover .icon-strip-tooltip{opacity:1}
.mobile-toggle{display:none;align-items:center;gap:6px;padding:10px 16px;background:var(--card);margin:0 0 10px;border-radius:10px;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;color:var(--teal)}

/* Card */
.card{background:var(--card);border-radius:16px;padding:20px 22px;border:1px solid var(--border);transition:transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94),box-shadow 0.3s ease}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,84,81,0.08)}
.card-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.card-header h3{font-size:12px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.5px;margin:0}
.card-header .header-right{display:flex;align-items:center;gap:6px}
.card-header .chevron{font-size:11px;color:var(--grey);transition:transform 0.2s}
.card-header .chevron.open{transform:rotate(180deg)}
.card-header .add-btn{padding:2px 8px;font-size:10px;font-weight:600;border-radius:4px;border:1px solid var(--teal);color:var(--teal);background:transparent;cursor:pointer;white-space:nowrap}
.card-header .add-btn:hover{background:var(--teal);color:#fff}
.card-body{margin-top:12px}
.card-body.collapsed{display:none}
.section-tip{font-size:10px;color:var(--grey);margin-bottom:10px;font-style:italic;line-height:1.4}

/* Inputs */
input[type="text"],input[type="number"],select,.num-display{width:100%;padding:6px 8px;border:1px solid var(--input-border);border-radius:6px;font-size:12px;background:var(--card);color:var(--dark)}
.num-display{cursor:text;min-height:30px;display:flex;align-items:center}
input[type="range"]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:var(--border);outline:none;cursor:pointer}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--teal);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.2);cursor:pointer;transition:transform 0.15s}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.2)}
input[type="range"]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--teal);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.2);cursor:pointer}
input[type="range"]::-moz-range-track{height:6px;border-radius:3px;background:var(--border)}
label{font-size:11px;color:var(--grey);display:block;margin-bottom:3px}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.input-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.input-full{margin-bottom:8px}

/* Buttons */
.btn{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:var(--teal-light)}
.btn-sm{padding:4px 8px;font-size:10px}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--dark)}.btn-outline:hover{background:var(--light)}

/* Dynamic items */
.dynamic-item{padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;position:relative;background:var(--light)}
.dynamic-item .remove-btn{position:absolute;top:6px;right:6px;background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;line-height:1}
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.toggle{position:relative;width:36px;height:20px;background:var(--input-border);border-radius:10px;cursor:pointer;transition:background 0.2s}
.toggle.on{background:var(--teal)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left 0.2s}
.toggle.on::after{left:18px}
.toggle.sm{width:28px;height:16px;border-radius:8px}
.toggle.sm::after{top:2px;left:2px;width:12px;height:12px}
.toggle.sm.on::after{left:14px}

/* Metrics */
.metrics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.metric{text-align:center;padding:18px 12px;background:var(--light);border-radius:14px;position:relative;overflow:hidden;transition:transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94),box-shadow 0.3s ease}
.metric:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,84,81,0.08)}
.metric-label{font-size:10px;color:var(--grey);text-transform:uppercase;letter-spacing:0.5px}
.metric-value{font-size:26px;font-weight:800;color:var(--teal);margin:6px 0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.metric-value.counting{transform:scale(1.08);color:var(--gold)}
.metric-sub{font-size:10px;color:var(--grey)}


/* Tables & tabs */
table{width:100%;border-collapse:collapse;font-size:11px}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--table-border)}
th{font-weight:600;color:var(--grey);font-size:10px;text-transform:uppercase}
.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;position:sticky;top:0;z-index:40;background:var(--card);padding:6px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border:1px solid var(--border)}
.tab-btn{padding:10px 18px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--grey);transition:all 0.25s;border-radius:8px}
.tab-btn.active{color:var(--teal);background:var(--teal-bg)}
.tab-btn:hover{color:var(--dark);background:var(--light)}

/* Verdicts */
.verdict-yes{background:#d4edda;color:#155724;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;display:inline-block}
.verdict-maybe{background:#fff3cd;color:#856404;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;display:inline-block}
.verdict-no{background:#f8d7da;color:#721c24;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;display:inline-block}
[data-theme="dark"] .verdict-yes{background:#1a3d1a;color:#6fdc6f}
[data-theme="dark"] .verdict-maybe{background:#3d3a1a;color:#f0d060}
[data-theme="dark"] .verdict-no{background:#3d1a1a;color:#f06060}

/* Misc */
.lang-selector{display:flex;gap:4px}
.lang-btn{padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--dark)}
.lang-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.header{text-align:center;padding:12px 0}
.header h1{font-size:20px;font-weight:700;color:var(--dark)}
.header .subtitle{font-size:12px;color:var(--grey);margin-top:4px}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px}
.chart-container{width:100%;height:300px;position:relative}
.chart-container canvas{width:100%!important;height:100%!important}
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.slider-row label{flex:1;margin:0;font-size:11px;color:var(--grey);white-space:nowrap}
.slider-row input[type="range"]{flex:2}
.slider-row .slider-val{min-width:42px;text-align:center;font-weight:600;color:var(--teal);font-size:11px;background:var(--teal-bg);padding:2px 6px;border-radius:10px}
.insight-box{padding:16px;background:var(--light);border-radius:12px;border-left:4px solid var(--teal);margin-bottom:12px;transition:transform 0.3s ease,box-shadow 0.3s ease}
.insight-box:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,84,81,0.06)}
.insight-title{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:6px}
.insight-desc{font-size:11px;color:var(--grey);line-height:1.6}
.planner-item{padding:12px;border:1px solid var(--planner-border);border-radius:8px;margin-bottom:8px;display:flex;align-items:center;gap:10px}

/* Premium KPI cards */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:var(--card);border-radius:16px;padding:28px 20px;text-align:center;border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,0.04);transition:transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94),box-shadow 0.3s ease}
.kpi-card:hover{transform:translateY(-5px);box-shadow:0 12px 32px rgba(0,84,81,0.1)}
.kpi-card .kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--grey);margin-bottom:8px}
.kpi-card .kpi-value{font-size:32px;font-weight:800;color:var(--teal);line-height:1.2;letter-spacing:-0.5px}
.kpi-card .kpi-sub{font-size:10px;color:var(--grey);margin-top:6px}
.health-ring{width:72px;height:72px;margin:0 auto 6px;position:relative}
.health-ring svg{transform:rotate(-90deg);width:72px;height:72px}
.health-ring .ring-value{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.cta-nudge{padding:14px 16px;background:var(--teal-bg);border-radius:10px;border-left:4px solid var(--teal);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.cta-nudge .cta-text{font-size:12px;color:var(--dark);font-weight:500;line-height:1.4}
.alert-card{padding:14px 16px;border-radius:12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:12px;transition:transform 0.3s ease,box-shadow 0.3s ease}
.alert-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.06)}
.alert-card.green{background:#d4edda;border-left:4px solid #28a745}
.alert-card.amber{background:#fff3cd;border-left:4px solid #D4A843}
.alert-card.red{background:#f8d7da;border-left:4px solid #c23030}
[data-theme="dark"] .alert-card.green{background:#1a3d1a;border-left-color:#6fdc6f}
[data-theme="dark"] .alert-card.amber{background:#3d3a1a;border-left-color:#f0c060}
[data-theme="dark"] .alert-card.red{background:#3d1a1a;border-left-color:#f06060}
.alert-card .alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.alert-card .alert-content{flex:1}
.alert-card .alert-title{font-size:12px;font-weight:700;margin-bottom:2px;color:var(--dark)}
.alert-card .alert-desc{font-size:11px;color:var(--grey);line-height:1.4}
.prop-card{background:var(--light);border-radius:10px;padding:16px;margin-bottom:10px;border:1px solid var(--border)}
.prop-card .prop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prop-card .prop-title{font-size:13px;font-weight:700;color:var(--dark)}
.prop-card .prop-equity{font-size:20px;font-weight:800;color:var(--teal)}
.ltv-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:6px 0}
.ltv-bar .ltv-fill{height:100%;border-radius:4px;transition:width 0.3s}
.empty-state{text-align:center;padding:40px 20px;color:var(--grey)}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px;opacity:0.6}
.empty-state .empty-text{font-size:13px;line-height:1.6}
.donut-container{width:100%;max-width:220px;height:180px;margin:0 auto}
.donut-container canvas{width:100%!important;height:100%!important}
.bar-container{width:100%;height:410px;position:relative}
.bar-container canvas{width:100%!important;height:100%!important}
.fire-gauge{display:flex;align-items:center;gap:8px;margin-top:4px}
.fire-gauge .fire-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.fire-gauge .fire-fill{height:100%;background:var(--teal);border-radius:3px;transition:width 0.4s}
.fire-gauge .fire-pct{font-size:11px;font-weight:700;color:var(--teal);min-width:36px;text-align:right}

/* Wizard */
.wizard-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.wizard-card{background:#fff;border-radius:20px;padding:36px;max-width:460px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
[data-theme="dark"] .wizard-card{background:var(--card)}
.wizard-card h2{font-size:20px;margin-bottom:8px}
.wizard-card p{color:var(--grey);margin-bottom:20px;font-size:13px}
.wizard-steps{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.wizard-step{width:8px;height:8px;border-radius:50%;background:var(--border)}
.wizard-step.active{background:var(--teal);width:20px;border-radius:4px}
.wizard-input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:10px;outline:none;transition:border 0.2s;background:var(--card);color:var(--dark)}
.wizard-input:focus{border-color:var(--teal)}
.wizard-btn{padding:10px 28px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--teal);color:#fff;transition:transform 0.1s}
.wizard-btn:hover{transform:scale(1.02)}
.wizard-skip{background:none;border:none;color:var(--grey);font-size:11px;cursor:pointer;margin-top:10px}
.wizard-intro{padding:48px 36px 36px}
.wizard-intro-slide{transition:all 0.3s ease}
.wizard-intro-slide.slide-in{opacity:1;transform:translateY(0)}
.wizard-intro-slide.slide-out{opacity:0;transform:translateY(-12px)}
@keyframes wizFadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.wizard-intro .wizard-steps{animation:wizFadeUp 0.4s ease 0.2s both}

/* Mobile: phones (max 600px) */
@media(max-width:600px){
  body{font-size:12px}
  .app-layout{padding:12px;gap:12px}
  .summary-bar{padding:10px 12px;border-radius:0 0 10px 10px;flex-wrap:nowrap;overflow-x:auto;gap:0}
  .summary-item{min-width:70px;padding:6px 8px}
  .summary-item .sv{font-size:16px;min-height:22px;letter-spacing:0}
  .summary-item .sl{font-size:7px}
  .summary-item .si-sub{display:none}
  .summary-help{width:18px;height:18px;font-size:9px}

  .kpi-row{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
  .kpi-card{padding:18px 12px;border-radius:14px}
  .kpi-card .kpi-value{font-size:24px}
  .kpi-card .kpi-label{font-size:9px}

  .metrics-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .metric{padding:14px 10px;border-radius:12px}
  .metric-value{font-size:22px}

  .card{padding:14px 14px;border-radius:14px;margin-bottom:4px}
  .card:hover{transform:none;box-shadow:none}
  .card:active{transform:scale(0.98);box-shadow:0 2px 8px rgba(0,84,81,0.1)}

  .kpi-card:hover{transform:none;box-shadow:none}
  .kpi-card:active{transform:scale(0.97);box-shadow:0 4px 16px rgba(0,84,81,0.1)}

  .metric:hover{transform:none;box-shadow:none}
  .metric:active{transform:scale(0.97)}

  .insight-box:hover{transform:none;box-shadow:none}
  .alert-card:hover{transform:none;box-shadow:none}

  .tabs{overflow-x:auto;flex-wrap:nowrap;gap:0;padding-top:6px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab-btn{padding:10px 14px;font-size:11px;white-space:nowrap;min-height:44px;border-radius:4px 4px 0 0}

  .chart-container{height:240px}
  .bar-container{height:320px}

  .progress-strip{padding:8px 12px;border-radius:10px;margin-bottom:10px}
  .progress-dot{width:20px;height:20px;font-size:9px}

  .right-panel{gap:14px}
  .left-panel{gap:12px}

  .input-row{grid-template-columns:1fr;gap:6px}
  .input-row-3{grid-template-columns:1fr 1fr;gap:6px}

  .btn{min-height:44px;padding:10px 16px;font-size:12px}
  .toggle{width:40px;height:22px}
  .toggle::after{width:18px;height:18px}
  .toggle.on::after{left:20px}

  .wizard-card{padding:24px 20px;border-radius:16px}
  .wizard-card h2{font-size:18px}
  .wizard-input{padding:12px 14px;font-size:15px}
  .wizard-btn{min-height:48px;font-size:14px}

  .header h1{font-size:17px}
  .header .subtitle{font-size:11px}
}

/* Small phones (max 400px) */
@media(max-width:400px){
  .kpi-row{grid-template-columns:1fr;gap:8px}
  .kpi-card .kpi-value{font-size:28px}

  .metrics-grid{grid-template-columns:1fr}

  .summary-bar{padding:8px 8px}
  .summary-item{min-width:60px;padding:4px 6px}
  .summary-item .sv{font-size:14px}

  .chart-container{height:200px}
  .bar-container{height:280px}

  .input-row-3{grid-template-columns:1fr}

  .tab-btn{padding:8px 12px;font-size:10px}
}

/* Touch device: disable hover lift globally */
@media(hover:none){
  .card:hover,.kpi-card:hover,.metric:hover,.insight-box:hover,.alert-card:hover{transform:none;box-shadow:none}
}

/* Scroll reveal animations */
.reveal{opacity:0;transform:translateY(20px) scale(0.98);transition:opacity 0.6s cubic-bezier(0.25,0.46,0.45,0.94),transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94)}
.reveal.visible{opacity:1;transform:translateY(0) scale(1)}
.reveal:nth-child(2){transition-delay:0.08s}
.reveal:nth-child(3){transition-delay:0.16s}
.reveal:nth-child(4){transition-delay:0.24s}
.reveal:nth-child(5){transition-delay:0.32s}

/* Smooth global transitions */
*{transition-timing-function:cubic-bezier(0.25,0.46,0.45,0.94)}
button,a,.btn,.tab-btn,.toggle{transition:all 0.25s cubic-bezier(0.25,0.46,0.45,0.94)}
.tab-btn:hover{transform:translateY(-1px)}
.btn:hover{transform:translateY(-1px)}

// ============ PROJECTION ENGINE ============
function calcTotalPoints(periods,retireYear){
  let total=0;
  periods.forEach(p=>{
    const start=p.startYear||CUR_YR;
    const end=Math.min(p.endYear||retireYear||CUR_YR+40, retireYear||CUR_YR+40);
    const yrs=Math.max(0,end-start);
    const pts=Math.min((p.salary||0)/NATIONAL_AVG,2.1);
    total+=pts*yrs;
  });
  return total;
}

function buildProjection(s){
  const by=s.birthYear||1994,pby=s.partnerBirthYear||1992;
  const startAge=CUR_YR-by;const data=[];
  let nonLiquid=0;
  // Track each liquid asset bucket separately for accurate per-asset growth
  const buckets=[];
  s.assets.forEach(a=>{const v=toEUR(a.value,a.ccy||'EUR');if(a.type==='property')nonLiquid+=v;else buckets.push({name:a.label||a.name||a.type,value:v,growth:(a.growth||0)/100,allocPct:a.allocPct||0});});
  const ptsYouTotal=calcTotalPoints(s.pensionPeriodsYou||[],by+(s.retireAge||67));
  const ptsPartnerTotal=calcTotalPoints(s.pensionPeriodsPartner||[],pby+(s.retireAgePartner||67));

  for(let age=startAge;age<=END_AGE;age++){
    const year=by+age;const pAge=year-pby;
    // For current year, record snapshot before any growth/cash flow
    if(age===startAge){
      const liquid0=buckets.reduce((sum,b)=>sum+b.value,0);
      const assetBreakdown0=buckets.map(b=>({name:b.name,value:Math.round(b.value)}));
      const propBreakdown0=[];let propVal0=nonLiquid;
      s.properties.forEach(p=>{const py=p.owned?CUR_YR-(p.yearsOwned||0):by+(p.purchaseAge||45);if(year>=py){const mktVal=(p.price||0)*Math.pow(1+(p.growthPct||2)/100,year-py);const loan=(p.price||0)*(1-(p.downPct||20)/100);const r=(p.rate||3.5)/100/12;const n=(p.term||25)*12;const yrsElapsed=year-py;const pmtsMade=Math.min(yrsElapsed*12,n);let remaining=0;if(pmtsMade<n&&r>0){remaining=loan*Math.pow(1+r,pmtsMade)-(loan*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1))*((Math.pow(1+r,pmtsMade)-1)/r);}const eq=mktVal-Math.max(0,remaining);propVal0+=eq;propBreakdown0.push({name:p.label||'Property',value:Math.round(eq)});}});
      let event0='';if(age===s.retireAge)event0='🏖️ You retire';
      data.push({age,year,partnerAge:pAge,liquidAssets:Math.round(liquid0),nonLiquidAssets:Math.round(propVal0),totalNetWorth:Math.round(liquid0+propVal0),totalIncome:0,totalSpend:0,netSaved:0,event:event0,assetBreakdown:assetBreakdown0,propBreakdown:propBreakdown0});
      continue;
    }
    const retired=age>=s.retireAge;
    let totalInc=0;const incBreakdown=[];
    s.incomeStreams.forEach((inc,idx)=>{
      const sy=inc.startYear||CUR_YR;
      const ey=inc.endYear||(idx===0?by+s.retireAge:idx===1?pby+s.retireAgePartner:by+s.retireAge);
      if(year<sy||year>ey)return;
      let onMat=false;
      if(inc.takesLeave){s.children.forEach(ch=>{const cby=ch.birthYear||(by+(ch.motherAge||32));const lm=idx===0?(ch.leaveMonths1||12):idx===1?(ch.leaveMonths2||0):(ch.leaveMonths1||12);const my=Math.ceil(lm/12);if(lm>0&&year>=cby&&year<cby+my)onMat=true;});}
      const elapsed=Math.max(0,year-sy);
      const g=Math.pow(1+(inc.growthPct||0)/100,Math.floor(elapsed/2));
      const freq=inc.frequency||'annual';const mult=freq==='monthly'?12:freq==='quarterly'?4:freq==='one-off'?1:1;
      let annual=onMat?ELTERNGELD*12:toEUR(inc.monthly,inc.ccy||'EUR')*g*mult;
      if(freq==='one-off'&&year!==inc.startYear)annual=0;
      if(inc.deTax)annual*=(1-DE_TAX_RATE);
      if(annual>0)incBreakdown.push({name:inc.label||'Income '+(idx+1),value:Math.round(annual)});
      totalInc+=annual;
    });
    s.children.forEach(ch=>{const cby=ch.birthYear||(by+(ch.motherAge||32));const ca=year-cby;if(ca>=0&&ca<18){totalInc+=KINDERGELD*12;incBreakdown.push({name:'Kindergeld',value:Math.round(KINDERGELD*12)});}});
    let pension=0;
    if(age>=s.pensionDrawAge){const ed=s.pensionDrawAge<67?(67-s.pensionDrawAge)*12*0.003:0;pension+=ptsYouTotal*PENSION_POINT_VALUE*12*(1-ed)*0.8;}
    if(pAge>=s.pensionDrawAgePartner){const ed=s.pensionDrawAgePartner<67?(67-s.pensionDrawAgePartner)*12*0.003:0;pension+=ptsPartnerTotal*PENSION_POINT_VALUE*12*(1-ed)*0.8;}
    if(retired){totalInc+=pension;if(pension>0)incBreakdown.push({name:'Pension',value:Math.round(pension)});}
    const inflF=Math.pow(1+(s.spendInflation||0)/100,year-CUR_YR);
    let totalSp=toEUR(s.baselineSpend,s.baselineCcy||'EUR')*12*inflF;const spBreakdown=[{name:'Baseline',value:Math.round(toEUR(s.baselineSpend,s.baselineCcy||'EUR')*12*inflF)}];
    s.children.forEach(ch=>{const cby=ch.birthYear||(by+(ch.motherAge||32));const ca=year-cby;if(ca>=0&&ca<=22){let mc=ca<1?1100:ca<3?700:ca<6?750:ca<10?800:ca<18?900:1000;if(ca<6){const kita=s.berlinKita?0:(s.kitaCost||450);mc+=kita;}totalSp+=mc*12*inflF;spBreakdown.push({name:'Child (age '+ca+')',value:Math.round(mc*12*inflF)});}});
    (s.adHocSpending||[]).forEach(item=>{const sy=item.startYear||CUR_YR;let v=0;if(item.frequency==='one-off'&&year===sy)v=toEUR(item.amount,item.ccy||'EUR');else if(item.frequency==='monthly'&&year>=sy)v=toEUR(item.amount,item.ccy||'EUR')*12*inflF;else if(item.frequency==='quarterly'&&year>=sy)v=toEUR(item.amount,item.ccy||'EUR')*4*inflF;else if(item.frequency==='annual'&&year>=sy)v=toEUR(item.amount,item.ccy||'EUR')*inflF;if(v>0){totalSp+=v;spBreakdown.push({name:item.label||'Ad-hoc',value:Math.round(v)});}});
    s.properties.forEach(p=>{const py=p.owned?CUR_YR-(p.yearsOwned||0):by+(p.purchaseAge||45);const tm=p.term||25;if(year>=py&&year<py+tm){const loan=(p.price||0)*(1-(p.downPct||20)/100);const r=(p.rate||3.5)/100/12;const n=tm*12;const pmt=(r>0?loan*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):loan/n)*12;totalSp+=pmt;spBreakdown.push({name:(p.label||'Mortgage'),value:Math.round(pmt)});}if(year===py&&!p.owned){const neben=((p.grunderwerbPct||6)+(p.notarPct||1.5)+(p.maklerPct||3.57))/100;const dpn=(p.price||0)*((p.downPct||20)/100+neben);totalSp+=dpn;spBreakdown.push({name:(p.label||'Property')+' purchase',value:Math.round(dpn)});}});
    if(retired&&age<s.pensionDrawAge){totalSp+=PHI_MO*12;spBreakdown.push({name:'Health insurance',value:Math.round(PHI_MO*12)});}
    const net=totalInc-totalSp;
    // Grow each bucket individually, then apply tax on total gains
    let totalGain=0;
    buckets.forEach(b=>{const g=b.value*b.growth;totalGain+=Math.max(0,g);b.value=Math.max(0,b.value+g);});
    const tax=Math.max(0,totalGain-SPARERPAUSCHBETRAG)*DE_TAX_RATE;
    const netCashFlow=net-tax;
    // Surplus split by user-defined allocPct per asset; remainder to cash buffer. Deficit drawn from lowest-growth first.
    if(netCashFlow>=0){
      let totalAlloc=buckets.reduce((s,b)=>s+(b.allocPct||0),0);
      if(totalAlloc>100)totalAlloc=100;
      buckets.forEach(b=>{if(b.allocPct>0)b.value+=netCashFlow*(b.allocPct/100);});
      const cashPortion=netCashFlow*Math.max(0,100-totalAlloc)/100;
      if(cashPortion>0){const cashBuf=buckets.find(b=>b.name==='💰 Cash Buffer');if(cashBuf)cashBuf.value+=cashPortion;else buckets.push({name:'💰 Cash Buffer',value:cashPortion,growth:0.01,allocPct:0});}
    } else {
      let deficit=-netCashFlow;
      const sorted=[...buckets].sort((a,b)=>a.growth-b.growth);
      for(const b of sorted){if(deficit<=0)break;const draw=Math.min(b.value,deficit);b.value-=draw;deficit-=draw;}
      // If deficit remains after draining all liquid buckets, track it as negative liquid
      if(deficit>0){const cashBuf=buckets.find(b=>b.name==='💰 Cash Buffer');if(cashBuf)cashBuf.value-=deficit;else buckets.push({name:'💰 Cash Buffer',value:-deficit,growth:0,allocPct:0});}
    }
    let liquid=buckets.reduce((s,b)=>s+b.value,0);
    let propVal=nonLiquid;
    s.properties.forEach(p=>{const py=p.owned?CUR_YR-(p.yearsOwned||0):by+(p.purchaseAge||45);if(year>=py){const mktVal=(p.price||0)*Math.pow(1+(p.growthPct||2)/100,year-py);const loan=(p.price||0)*(1-(p.downPct||20)/100);const r=(p.rate||3.5)/100/12;const n=(p.term||25)*12;const yrsElapsed=year-py;const pmtsMade=Math.min(yrsElapsed*12,n);let remaining=0;if(pmtsMade<n&&r>0){remaining=loan*Math.pow(1+r,pmtsMade)-(loan*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1))*((Math.pow(1+r,pmtsMade)-1)/r);}propVal+=mktVal-Math.max(0,remaining);}});
    let event='';
    s.children.forEach((ch,i)=>{const cby=ch.birthYear||(by+(ch.motherAge||32));if(year===cby&&year>=CUR_YR)event='👶 '+(ch.label||'Child '+(i+1)+' born');});
    s.properties.forEach((p,i)=>{const py=p.owned?CUR_YR-(p.yearsOwned||0):by+(p.purchaseAge||45);if(year===py&&!p.owned)event='🏠 '+(p.label||'Property '+(i+1));});
    // Ad-hoc spending events (one-off items > €5k or first year of recurring)
    if(!event)(s.adHocSpending||[]).forEach(a=>{if(!event&&a.amount&&toEUR(a.amount,a.ccy||'EUR')>=5000){const sy=a.startYear||CUR_YR;const freq=a.frequency||'one-off';if(freq==='one-off'&&year===sy)event='💸 '+(a.label||'Big expense');else if(freq!=='one-off'&&year===sy)event='📌 '+(a.label||'Recurring start');}});
    if(age===s.retireAge)event='🏖️ You retire';
    else if(pAge===s.retireAgePartner&&!event)event='🏖️ Partner retires';
    if(age===s.pensionDrawAge&&!event)event='💰 Pension starts';
    const assetBreakdown=buckets.map(b=>({name:b.name,value:Math.round(b.value)}));
    const propBreakdown=[];
    s.properties.forEach(p=>{const py=p.owned?CUR_YR-(p.yearsOwned||0):by+(p.purchaseAge||45);if(year>=py){const mktVal=(p.price||0)*Math.pow(1+(p.growthPct||2)/100,year-py);const loan=(p.price||0)*(1-(p.downPct||20)/100);const r=(p.rate||3.5)/100/12;const n=(p.term||25)*12;const yrsElapsed=year-py;const pmtsMade=Math.min(yrsElapsed*12,n);let remaining=0;if(pmtsMade<n&&r>0){remaining=loan*Math.pow(1+r,pmtsMade)-(loan*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1))*((Math.pow(1+r,pmtsMade)-1)/r);}propBreakdown.push({name:p.label||'Property',value:Math.round(mktVal-Math.max(0,remaining))});}});
    data.push({age,year,partnerAge:pAge,liquidAssets:Math.round(liquid),nonLiquidAssets:Math.round(propVal),totalNetWorth:Math.round(liquid+propVal),totalIncome:Math.round(totalInc),totalSpend:Math.round(totalSp),netSaved:Math.round(net),event,assetBreakdown,propBreakdown,incomeBreakdown:incBreakdown,spendBreakdown:spBreakdown});
  }
  return data;
}

// ============ MONTE CARLO ============
function runMC(s,runs=1000){
  const by=s.birthYear||1994,pby=s.partnerBirthYear||1992,startAge=CUR_YR-by,target=90;
  const volByType={cash:0.02,bonds:0.05,etf:0.15,stocks:0.2,crypto:0.4,dividends:0.12,other:0.15};
  // Build per-bucket model: each asset grows independently with its own mean & vol
  const initBuckets=[];
  s.assets.forEach(a=>{if(a.type!=='property'){initBuckets.push({value:toEUR(a.value,a.ccy||'EUR'),mean:(a.growth||0)/100,vol:volByType[a.type]||0.15,allocPct:a.allocPct||0});}});
  const ptsY=calcTotalPoints(s.pensionPeriodsYou||[],by+(s.retireAge||67));
  const ptsP=calcTotalPoints(s.pensionPeriodsPartner||[],(s.partnerBirthYear||1992)+(s.retireAgePartner||67));
  let seed=42;
  const rand=()=>{seed=(seed*1664525+1013904223)&0xFFFFFFFF;return(seed>>>0)/4294967296;};
  const rn=()=>{const u=rand(),v=rand();return Math.sqrt(-2*Math.log(u||0.001))*Math.cos(2*Math.PI*v);};
  let succ=0,comf=0;const finals=[];
  for(let run=0;run<runs;run++){
    // Each run: clone buckets
    const buckets=initBuckets.map(b=>({...b}));
    let ok=true;
    for(let age=startAge;age<=target;age++){
      const year=by+age;let inc=0;
      s.incomeStreams.forEach((st,idx)=>{const sy=st.startYear||CUR_YR;const ey=st.endYear||(idx===0?by+s.retireAge:idx===1?(s.partnerBirthYear||1992)+s.retireAgePartner:by+s.retireAge);if(year>=sy&&year<=ey){let onMat=false;if(st.takesLeave){s.children.forEach(ch=>{const cby=ch.birthYear||(by+(ch.motherAge||32));const lm=idx===0?(ch.leaveMonths1||12):idx===1?(ch.leaveMonths2||0):(ch.leaveMonths1||12);const my=Math.ceil(lm/12);if(lm>0&&year>=cby&&year<cby+my)onMat=true;});}const g=Math.pow(1+(st.growthPct||0)/100,Math.floor(Math.max(0,year-sy)/2));const freq=st.frequency||'annual';const mult=freq==='monthly'?12:freq==='quarterly'?4:freq==='one-off'?1:1;let annual=onMat?ELTERNGELD*12:toEUR(st.monthly,st.ccy||'EUR')*g*mult;if(freq==='one-off'&&year!==sy)annual=0;if(st.deTax)annual*=(1-DE_TAX_RATE);inc+=annual;}});
      s.children.forEach(ch=>{const ca=year-(ch.birthYear||(by+(ch.motherAge||32)));if(ca>=0&&ca<18)inc+=KINDERGELD*12;});
      if(age>=(s.pensionDrawAge||67))inc+=ptsY*PENSION_POINT_VALUE*12*0.8;
      const pAge=year-pby;if(pAge>=(s.pensionDrawAgePartner||67))inc+=ptsP*PENSION_POINT_VALUE*12*0.8;
      const inflF=Math.pow(1+(s.spendInflation||0)/100,year-CUR_YR);
      let sp=toEUR(s.baselineSpend,s.baselineCcy||'EUR')*12*inflF;
      if(age>=s.retireAge&&age<(s.pensionDrawAge||67))sp+=PHI_MO*12;
      s.children.forEach(ch=>{const ca=year-(ch.birthYear||(by+(ch.motherAge||32)));if(ca>=0&&ca<=22)sp+=700*12*inflF;});
      s.properties.forEach(p=>{const py=p.owned?CUR_YR-(p.yearsOwned||0):by+(p.purchaseAge||45);const tm=p.term||25;if(year>=py&&year<py+tm){const l=(p.price||0)*(1-(p.downPct||20)/100);const r=(p.rate||3.5)/100/12;const n=tm*12;sp+=(r>0?l*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):l/n)*12;}if(year===py&&!p.owned){const neben=((p.grunderwerbPct||6)+(p.notarPct||1.5)+(p.maklerPct||3.57))/100;sp+=(p.price||0)*((p.downPct||20)/100+neben);}});
      // Grow each bucket independently with its own random return
      let totalGain=0;
      buckets.forEach(b=>{const ret=b.mean+b.vol*rn();const gain=b.value*ret;totalGain+=Math.max(0,gain);b.value=Math.max(0,b.value+gain);});
      const tax=Math.max(0,totalGain-SPARERPAUSCHBETRAG)*DE_TAX_RATE;
      const netCashFlow=inc-sp-tax;
      // Apply net cash flow: split by allocPct per bucket, rest to cash buffer
      if(netCashFlow>=0){
        let totalAlloc=buckets.reduce((s,b)=>s+(b.allocPct||0),0);
        if(totalAlloc>100)totalAlloc=100;
        buckets.forEach(b=>{if(b.allocPct>0)b.value+=netCashFlow*(b.allocPct/100);});
        const cashPortion=netCashFlow*Math.max(0,100-totalAlloc)/100;
        if(cashPortion>0){const cb=buckets.find(b=>b.mean<=0.01&&b.vol<=0.01);if(cb)cb.value+=cashPortion;else buckets.push({value:cashPortion,mean:0.01,vol:0.005,allocPct:0});}
      } else {
        let deficit=-netCashFlow;
        const sorted=[...buckets].sort((a,b)=>a.mean-b.mean);
        for(const b of sorted){if(deficit<=0)break;const draw=Math.min(b.value,deficit);b.value-=draw;deficit-=draw;}
        if(deficit>0){ok=false;break;}
      }
      const liq=buckets.reduce((sum,b)=>sum+b.value,0);
      if(liq<0){ok=false;break;}
    }
    const finalLiq=buckets.reduce((sum,b)=>sum+b.value,0);
    if(ok)succ++;if(ok&&finalLiq>(s.baselineSpend||2000)*24)comf++;finals.push(finalLiq);
  }
  finals.sort((a,b)=>a-b);
  return{successRate:Math.round(succ/runs*100),comfortableRate:Math.round(comf/runs*100),median:Math.round(finals[Math.floor(runs/2)]),worst10:Math.round(finals[Math.floor(runs*0.1)])};
}

// ============ ANIMATED METRIC ============
function AnimMetric({value,label,format,color,sub,tip}){
  const ref=React.useRef(null);
  const prevRef=React.useRef(value);
  React.useEffect(()=>{
    if(!ref.current||prevRef.current===value)return;
    const el=ref.current;
    el.classList.add('counting');
    const start=prevRef.current,end=value,t0=performance.now();
    const dur=600;
    const animate=(now)=>{
      const p=Math.min((now-t0)/dur,1);
      const eased=1-Math.pow(1-p,3);
      const cur=Math.round(start+(end-start)*eased);
      el.textContent=format?format(cur):fmtK(cur);
      if(p<1)requestAnimationFrame(animate);else{el.classList.remove('counting');prevRef.current=value;}
    };
    requestAnimationFrame(animate);
  },[value]);
  React.useEffect(()=>{prevRef.current=value;},[]);
  return(
    <div className="metric" title={tip||''}>
      <div className="metric-label">{label}</div>
      <div className="metric-value" ref={ref} style={color?{color}:{}}>{format?format(value):fmtK(value)}</div>
      {sub && <div className="metric-sub">{sub}</div>}
    </div>
  );
}

      html+='<svg width="'+spW+'" height="'+spH+'" style="display:block"><line x1="0" y1="'+(spH/2)+'" x2="'+spW+'" y2="'+(spH/2)+'" stroke="'+(dk2?'#3a3f45':'#e0e0e0')+'" stroke-width="0.5"/><path d="'+svgPath+'" fill="none" stroke="'+lineCol+'" stroke-width="1.5" stroke-linecap="round"/><circle cx="'+(idx/(slice.length-1)*spW).toFixed(1)+'" cy="'+(spH/2-cumData[idx]/maxC*(spH/2-2)).toFixed(1)+'" r="2.5" fill="'+lineCol+'"/></svg>';
      html+='</div>';
      // Event badge if present
      if(dp.event){html+='<div style="margin-top:5px;padding:3px 8px;background:'+(dk2?'rgba(212,168,67,0.15)':'rgba(212,168,67,0.1)')+';border-radius:4px;font-size:9px;font-weight:600;color:'+(dk2?'#D4A843':'#8b6914')+'">'+dp.event+'</div>';}
      el.innerHTML=html;
      const pos=chart.canvas.getBoundingClientRect();
      const left=pos.left+window.scrollX+tooltip.caretX+16;
      const top=pos.top+window.scrollY+tooltip.caretY-el.offsetHeight/2;
      el.style.left=Math.min(left,window.innerWidth+window.scrollX-el.offsetWidth-10)+'px';
      el.style.top=Math.max(top,window.scrollY+4)+'px';
    };
    barInst.current=new Chart(barRef.current.getContext('2d'),{type:'bar',data:{labels:slice.map(d=>d.age),datasets:[
      {label:t('th_earn'),data:slice.map(d=>d.totalIncome),backgroundColor:incColor,borderRadius:5,borderSkipped:false},
      {label:t('th_spend'),data:slice.map(d=>-d.totalSpend),backgroundColor:expColor,borderRadius:5,borderSkipped:false},
      {label:t('surplus_label'),data:netData,type:'line',borderColor:dk2?'#D4A843':'#b8860b',backgroundColor:(()=>{const ctx2=barRef.current.getContext('2d');const g=ctx2.createLinearGradient(0,0,0,320);g.addColorStop(0,dk2?'rgba(212,168,67,0.25)':'rgba(184,134,11,0.18)');g.addColorStop(0.5,'rgba(212,168,67,0.05)');g.addColorStop(1,'rgba(224,112,128,0.12)');return g;})(),fill:true,borderWidth:2.5,pointRadius:4,pointHoverRadius:7,pointBackgroundColor:netData.map(v=>v>=0?(dk2?'#D4A843':'#b8860b'):(dk2?'#e07080':'#c23030')),pointBorderColor:netData.map(v=>v>=0?(dk2?'rgba(212,168,67,0.3)':'rgba(184,134,11,0.3)'):(dk2?'rgba(224,112,128,0.3)':'rgba(194,48,48,0.3)')),pointBorderWidth:2,tension:0.35,yAxisID:'y',order:0}
    ]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:52,bottom:4}},animation:{duration:700,easing:'easeOutQuart',delay:(ctx)=>{if(ctx.type==='data'&&ctx.mode==='default')return ctx.dataIndex*30;return 0;}},events:['mousemove','mouseout','touchstart','touchmove'],interaction:{mode:'index',intersect:false,axis:'x'},hover:{mode:'index',intersect:false},plugins:{legend:{position:'bottom',align:'center',labels:{boxWidth:10,font:{size:10,weight:'500'},color:dk2?'#ccc':'#444',padding:16,usePointStyle:true,pointStyle:'rectRounded'}},tooltip:{enabled:false,external:externalBarTooltip}},scales:{x:{title:{display:true,text:t('th_age'),font:{size:10,weight:'600'},color:dk2?'#aaa':'#555'},ticks:{font:{size:8,weight:'500'},color:dk2?'#999':'#666',maxRotation:0},grid:{display:false}},y:{ticks:{font:{size:9},color:dk2?'#999':'#666',callback:v=>(v>=0?'':'−')+'€'+fmtK(Math.abs(v))},grid:{color:dk2?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.04)'}}}},plugins:[zeroLinePlugin,crosshairPlugin,milestonePlugin,yoyPlugin,hoverFadePlugin]});
    return()=>{if(barInst.current)barInst.current.destroy();};
  },[data,activeTab,lang,darkMode]);

  // ============ RENDER ============
  return(
    <div>
      {/* Wizard */}
      {!wizardDone && <Wizard onComplete={handleWizardComplete} t={t} lang={lang} setLang={setLang}/>}

      {/* ===== HEADER (compact — title + illustration) ===== */}
      <div style={{background:darkMode?'var(--card)':'linear-gradient(135deg,#fef9f4 0%,#fff5ee 40%,#f8f0e8 100%)',padding:'16px 24px',borderBottom:'1px solid '+(darkMode?'var(--border)':'rgba(181,91,100,0.1)'),position:'relative'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',maxWidth:1200,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:16,minWidth:0,flex:1}}>
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style={{flexShrink:0}}>
              <circle cx="24" cy="24" r="22" fill="var(--teal-bg)" stroke="var(--teal)" strokeWidth="1" opacity="0.6"/>
              <path d="M10 34 C14 32, 18 28, 22 25 C26 22, 30 24, 34 20 C37 17, 40 15, 42 12" stroke="var(--teal)" strokeWidth="2" strokeLinecap="round" fill="none"/>
              <circle cx="42" cy="12" r="3" fill="var(--coral)"/>
              <circle cx="42" cy="12" r="1.5" fill="#fff"/>
              <circle cx="22" cy="25" r="2" fill="var(--teal)" opacity="0.4"/>
              <circle cx="34" cy="20" r="2" fill="var(--teal)" opacity="0.4"/>
              <path d="M38 8 L39 10 L41 10.5 L39 11 L38 13 L37 11 L35 10.5 L37 10 Z" fill="var(--gold)" opacity="0.8"/>
            </svg>
            <div style={{minWidth:0}}>
              <h1 style={{fontSize:18,fontWeight:800,color:'var(--dark)',letterSpacing:'-0.3px',margin:0,lineHeight:1.3}}>{titleName?titleName+"'s ":''}{t('header_title')}</h1>
              <p style={{fontSize:11,color:'var(--grey)',margin:0,marginTop:2}}>{t('header_sub')}</p>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
            {['en','de','vi'].map(l=><span key={l} onClick={()=>setLang(l)} style={{fontSize:10,fontWeight:lang===l?700:400,opacity:lang===l?1:0.5,cursor:'pointer',color:'var(--teal)',letterSpacing:'0.3px'}}>{l.toUpperCase()}</span>)}
            <span className={'toggle sm'+(darkMode?' on':'')} onClick={()=>setDarkMode(!darkMode)}></span>
          </div>
        </div>
      </div>

      {/* ===== SUMMARY BAR (below header) ===== */}
      <div style={{position:'sticky',top:0,zIndex:50}}>
        <div className={'summary-bar'+((barHidden&&!showLegend)?' bar-mini':'')}>
          <div className="summary-item">
            <div className="sl">{t('sb_nw')}</div>
            <div className="sv" style={{color:'#6ee7b7'}}>€{fmtK(curData.totalNetWorth||0)}</div>
            {showLegend && <div className="si-sub" style={{animationDelay:'0s'}}>{t('sb_tip_nw')}</div>}
          </div>
          <div className="summary-item">
            <div className="sl">{t('sb_surplus')}</div>
            <div className="sv" style={{color:monthlySurplus>=0?'#6ee7b7':'#fca5a5'}}>{monthlySurplus>=0?'+':'-'}€{fmt(Math.abs(monthlySurplus))}</div>
            {showLegend && <div className="si-sub" style={{animationDelay:'0.08s'}}>{t('sb_tip_surplus')}</div>}
          </div>
          <div className="summary-item">
            <div className="sl">{t('sb_mc')}</div>
            <div className="sv" style={{color:mc.successRate>=70?'#6ee7b7':mc.successRate>=50?'#fde68a':'#fca5a5'}}>{mc.successRate}%</div>
            {showLegend && <div className="si-sub" style={{animationDelay:'0.16s'}}>{t('sb_tip_mc')}</div>}
          </div>
          <div className="summary-item">
            <div className="sl">{t('sb_retire')}</div>
            <div className="sv">{(()=>{const neg=data.find(d=>d.age>retireAge&&d.liquidAssets<0);const lastsTo=neg?neg.age:END_AGE;return <span style={{color:lastsTo>=90?'#6ee7b7':lastsTo>=80?'#fde68a':'#fca5a5'}}>{retireAge} → {lastsTo>=END_AGE?END_AGE+'+':lastsTo}</span>;})()}</div>
            {showLegend && <div className="si-sub" style={{animationDelay:'0.24s'}}>{t('sb_tip_retire')}</div>}
          </div>
          <div className="summary-item">
            <div className="sl">{t('sb_event')}</div>
            <div className="sv" style={{fontSize:'14px'}}>{(data.find(d=>d.event&&d.age>curAge)||{}).event||'—'}</div>
            {showLegend && <div className="si-sub" style={{animationDelay:'0.32s'}}>{t('sb_tip_event')}</div>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'4px',paddingLeft:6,flexShrink:0}}>
            <div className="summary-help" onClick={()=>setShowLegend(!showLegend)}>?</div>
          </div>
        </div>
      </div>

      {/* Mobile drawer toggle */}
      <div className="mobile-toggle" onClick={()=>setMobileOpen(!mobileOpen)}>
        <span>{t('mobile_inputs')}</span>
        <span style={{marginLeft:'auto',fontSize:'10px',color:'var(--grey)'}}>{t('progress_complete').replace('{0}',sectionsDone)}</span>
        <span>{mobileOpen?'▲':'▼'}</span>
      </div>


      <div className={'app-layout'+(panelOpen?'':' collapsed')}>
        {/* ===== LEFT PANEL or ICON STRIP ===== */}
        {panelOpen ? <div className={'left-panel'+(mobileOpen?' mobile-open':'')}>
          <button onClick={()=>setPanelOpen(false)} style={{position:'sticky',top:0,zIndex:10,alignSelf:'flex-end',background:'var(--card)',border:'1px solid var(--border)',cursor:'pointer',fontSize:'10px',color:'var(--grey)',padding:'4px 10px',borderRadius:20,boxShadow:'0 2px 6px rgba(0,0,0,0.06)'}} title="Collapse">◀ Hide</button>

          {/* Personal */}
          <Card title={t('personal')} emoji="👫" tip={t('tip_personal')} defaultOpen={true} forceOpen={forceOpenSection} section="personal">
            <div className="input-row">
              <div><label>👤 {t('your_name')}</label><input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Linh"/></div>
              <div><label>👤 {t('partner_name')}</label><input type="text" value={partnerName} onChange={e=>setPartnerName(e.target.value)} placeholder="e.g. Max"/></div>
            </div>
            <div className="input-row">
              <div><label>🎂 {t('your_birth_year')}</label><input type="number" value={birthYear} onChange={e=>setBirthYear(+e.target.value)}/></div>
              <div><label>🎂 {t('partner_birth_year')}</label><input type="number" value={partnerBirthYear} onChange={e=>setPartnerBirthYear(+e.target.value)}/></div>
            </div>
          </Card>

          {/* Assets */}
          <Card title={t('assets')} emoji="🏦" onAdd={addAsset} addLabel={t('add')} tip={t('tip_assets')} defaultOpen={true} forceOpen={forceOpenSection} section="assets">
            <div style={{fontSize:'9px',color:'var(--grey)',marginBottom:8,padding:'3px 6px',background:'var(--light)',borderRadius:4}}>💱 FX: 1 USD = 0.92 · 1 SGD = 0.69 · 1 VND = 0.000037 EUR</div>
            {assets.map(a=>(
              <div key={a.id} className="dynamic-item">
                <button className="remove-btn" onClick={()=>rmAsset(a.id)}>✕</button>
                <div className="input-row">
                  <div><label>{t('asset_name')}</label><input type="text" value={a.name} onChange={e=>upAsset(a.id,'name',e.target.value)}/></div>
                  <div><label>{t('asset_type')}</label><select value={a.type} onChange={e=>upAsset(a.id,'type',e.target.value)}>{['cash','etf','stocks','bonds','dividends','crypto','property','other'].map(tp=><option key={tp} value={tp}>{t('type_'+tp)}</option>)}</select></div>
                </div>
                <div className="input-row-3">
                  <div><label>{t('asset_value')}</label><NumInput value={a.value} onChange={v=>upAsset(a.id,'value',v)}/></div>
                  <div><label>{t('currency')}</label><select value={a.ccy||'EUR'} onChange={e=>upAsset(a.id,'ccy',e.target.value)}>{CURRENCIES.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                  <div><label>{t('asset_growth')}</label><div className="slider-row"><input type="range" min={0} max={15} step={0.5} value={a.growth||0} onChange={e=>upAsset(a.id,'growth',+e.target.value)}/><span className="slider-val">{a.growth||0}%</span></div></div>
                </div>
              </div>
            ))}
          </Card>

          {/* Income */}
          <Card title={t('income')} emoji="💼" onAdd={addIncome} addLabel={t('add')} tip={t('tip_income')} forceOpen={forceOpenSection} section="income">
            {incomeStreams.map((inc,idx)=>(
              <div key={inc.id} className="dynamic-item">
                <button className="remove-btn" onClick={()=>rmIncome(inc.id)}>✕</button>
                <div className="input-row-3">
                  <div><label>{t('income_label')}</label><input type="text" value={inc.label} onChange={e=>upIncome(inc.id,'label',e.target.value)}/></div>
                  <div><label>{t('income_amount')}</label><NumInput value={inc.monthly} onChange={v=>upIncome(inc.id,'monthly',v)}/></div>
                  <div><label>{t('income_freq')}</label><select value={inc.frequency||'annual'} onChange={e=>upIncome(inc.id,'frequency',e.target.value)}><option value="annual">{t('freq_annual')}</option><option value="monthly">{t('freq_monthly')}</option><option value="quarterly">{t('freq_quarterly')}</option><option value="one-off">{t('freq_one_off')}</option></select></div>
                </div>
                <div className="input-row-3">
                  <div><label>{t('currency')}</label><select value={inc.ccy||'EUR'} onChange={e=>upIncome(inc.id,'ccy',e.target.value)}>{CURRENCIES.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                  <div><label>{t('income_start')}</label><input type="number" value={inc.startYear} onChange={e=>upIncome(inc.id,'startYear',+e.target.value)}/></div>
                  <div><label>{t('income_end')}</label><input type="number" value={inc.endYear||''} onChange={e=>upIncome(inc.id,'endYear',e.target.value?+e.target.value:null)} placeholder={t('ongoing')}/></div>
                </div>
                <div className="input-row-3">
                  <div><label>{t('income_growth')}</label><div className="slider-row"><input type="range" min={0} max={10} step={0.5} value={inc.growthPct||0} onChange={e=>upIncome(inc.id,'growthPct',+e.target.value)}/><span className="slider-val">{inc.growthPct||0}%</span></div></div>
                </div>
                <div className="toggle-row">
                  <span className={'toggle'+(inc.deTax?' on':'')} onClick={()=>upIncome(inc.id,'deTax',!inc.deTax)}></span><span style={{fontSize:'10px',color:'var(--grey)'}}>{t('income_tax')}</span>
                  <span style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:4}}>
                    <span className={'toggle'+(inc.takesLeave?' on':'')} onClick={()=>upIncome(inc.id,'takesLeave',!inc.takesLeave)}></span>
                    <span style={{fontSize:'10px',color:'var(--grey)'}}>{t('parental_leave')}</span>
                  </span>
                </div>
              </div>
            ))}
          </Card>

          {/* Surplus Allocation */}
          <Card title={t('surplus_alloc_title')} emoji="📊" tip={t('surplus_alloc_tip')} defaultOpen={true}>
            {assets.filter(a=>a.type!=='property').map(a=>{
              const othersTotal=assets.filter(x=>x.id!==a.id&&x.type!=='property').reduce((s,x)=>s+(x.allocPct||0),0);
              const maxSlider=100-othersTotal;
              return(
                <div key={a.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <span style={{fontSize:'11px',fontWeight:600,minWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.name||a.type}</span>
                  <input type="range" min={0} max={maxSlider} step={5} value={Math.min(a.allocPct||0,maxSlider)} onChange={e=>upAllocPct(a.id,+e.target.value)} style={{flex:1,height:4}}/>
                  <span style={{fontSize:'11px',fontWeight:700,minWidth:32,textAlign:'right'}}>{a.allocPct||0}%</span>
                </div>
              );
            })}
            {(()=>{const totalAlloc=assets.filter(a=>a.type!=='property').reduce((s,a)=>s+(a.allocPct||0),0);const cashPct=Math.max(0,100-totalAlloc);return(
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderTop:'1px solid var(--border)'}}>
                <span style={{fontSize:'11px',fontWeight:600,minWidth:90}}>💰 {t('alloc_cash')}</span>
                <div style={{flex:1,height:4,background:'var(--border)',borderRadius:2,position:'relative'}}><div style={{height:'100%',width:cashPct+'%',background:'var(--gold)',borderRadius:2}}></div></div>
                <span style={{fontSize:'11px',fontWeight:700,minWidth:32,textAlign:'right'}}>{cashPct}%</span>
              </div>
            );})()}
          </Card>

          {/* Spending */}
          <Card title={t('spending')} emoji="🛒" onAdd={addAdHoc} addLabel={t('add')} tip={t('tip_spending')} forceOpen={forceOpenSection} section="spending">
            <div className="input-row" style={{marginBottom:8}}>
              <div><label>{t('spend_baseline')}</label><NumInput value={baselineSpend} onChange={setBaselineSpend}/></div>
              <div><label>{t('spend_inflation')}</label><div className="slider-row"><input type="range" min={0} max={8} step={0.5} value={spendInflation||0} onChange={e=>setSpendInflation(+e.target.value)}/><span className="slider-val">{spendInflation||0}%</span></div></div>
            </div>
            {adHocSpending.map(item=>(
              <div key={item.id} className="dynamic-item">
                <button className="remove-btn" onClick={()=>rmAdHoc(item.id)}>✕</button>
                <div className="input-row-3">
                  <div><label>{t('spend_label')}</label><input type="text" value={item.label} onChange={e=>upAdHoc(item.id,'label',e.target.value)}/></div>
                  <div><label>{t('spend_amount')}</label><NumInput value={item.amount} onChange={v=>upAdHoc(item.id,'amount',v)}/></div>
                  <div><label>{t('currency')}</label><select value={item.ccy||'EUR'} onChange={e=>upAdHoc(item.id,'ccy',e.target.value)}>{CURRENCIES.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                </div>
                <div className="input-row">
                  <div><label>{t('spend_start')}</label><input type="number" value={item.startYear} onChange={e=>upAdHoc(item.id,'startYear',+e.target.value)}/></div>
                  <div><label>{t('spend_freq')}</label><select value={item.frequency} onChange={e=>upAdHoc(item.id,'frequency',e.target.value)}><option value="one-off">{t('freq_one_off')}</option><option value="monthly">{t('freq_monthly')}</option><option value="quarterly">{t('freq_quarterly')}</option><option value="annual">{t('freq_annual')}</option></select></div>
                </div>
              </div>
            ))}
          </Card>

          {/* Children */}
          <Card title={t('children')} emoji="👶" onAdd={children.length<3?addChild:null} addLabel={t('add')} tip={t('tip_children')} defaultOpen={children.length>0} forceOpen={forceOpenSection} section="children">
            <div style={{fontSize:'9px',color:'var(--grey)',marginBottom:8,padding:'3px 6px',background:'var(--light)',borderRadius:4}}>{t('children_tip')}</div>
            <div style={{padding:'8px 10px',background:'var(--light)',borderRadius:8,marginBottom:10,border:'1px solid var(--border)'}}>
              <div className="toggle-row" style={{marginBottom:berlinKita?0:6}}>
                <span className={'toggle'+(berlinKita?' on':'')} onClick={()=>{setBerlinKita(!berlinKita);if(!berlinKita)setKitaCost(0);else setKitaCost(450);}}></span>
                <span style={{fontSize:'10px',fontWeight:600}}>{t('kita_berlin_label')}</span>
              </div>
              {!berlinKita && (
                <div className="input-row" style={{marginTop:6}}>
                  <div><label>{t('kita_cost_label')}</label><input type="number" value={kitaCost} onChange={e=>setKitaCost(+e.target.value)} style={{width:80}}/><span style={{fontSize:'9px',color:'var(--grey)',marginLeft:4}}>€/mo</span></div>
                </div>
              )}
            </div>
            {children.map((ch,idx)=>(
              <div key={ch.id} className="dynamic-item">
                <button className="remove-btn" onClick={()=>rmChild(ch.id)}>✕</button>
                <div style={{fontSize:'11px',fontWeight:600,marginBottom:6,color:'var(--teal)'}}>👶 {t('child_n')} {idx+1}</div>
                <div className="input-row">
                  <div><label>{t('child_birth_year')}</label><input type="number" value={ch.birthYear} onChange={e=>upChild(ch.id,'birthYear',+e.target.value)}/></div>
                </div>
                <div style={{marginTop:8,fontSize:'10px',fontWeight:600,color:'var(--grey)',marginBottom:4}}>{t('elternzeit_split')}</div>
                <div className="slider-row">
                  <label>{name||t('person1')}</label><input type="range" min={0} max={36} step={1} value={ch.leaveMonths1||0} onChange={e=>upChild(ch.id,'leaveMonths1',+e.target.value)}/><span className="slider-val">{ch.leaveMonths1||0}mo</span>
                </div>
                <div className="slider-row">
                  <label>{partnerName||t('person2')}</label><input type="range" min={0} max={36} step={1} value={ch.leaveMonths2||0} onChange={e=>upChild(ch.id,'leaveMonths2',+e.target.value)}/><span className="slider-val">{ch.leaveMonths2||0}mo</span>
                </div>
                {(ch.leaveMonths1||0)+(ch.leaveMonths2||0)>36 && <div style={{fontSize:'9px',color:'var(--coral)',marginTop:2}}>{t('max_exceeded')}</div>}
              </div>
            ))}
            {children.length===0 && <div style={{fontSize:'11px',color:'var(--grey)',textAlign:'center',padding:8}}>{t('no_children')}</div>}
          </Card>

          {/* Properties */}
          <Card title={t('properties')} emoji="🏠" onAdd={addProp} addLabel={t('add')} tip={t('tip_properties')} defaultOpen={properties.length>0} forceOpen={forceOpenSection} section="properties">
            {properties.map((p,idx)=>(
              <div key={p.id} className="dynamic-item">
                <button className="remove-btn" onClick={()=>rmProp(p.id)}>✕</button>
                <div className="input-row">
                  <div><label>{t('prop_label')}</label><input type="text" value={p.label} onChange={e=>upProp(p.id,'label',e.target.value)} placeholder={t('property_bucket')+' '+(idx+1)}/></div>
                </div>

<script>
// Scroll-reveal: observe cards, KPI cards, metrics, insight boxes, alert cards
function initReveal(){
  const targets=document.querySelectorAll('.card,.kpi-card,.metric,.insight-box,.alert-card,.kpi-row,.chart-container,.bar-container,.donut-container');
  targets.forEach(el=>el.classList.add('reveal'));
  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
      }
    });
  },{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
  targets.forEach(el=>observer.observe(el));
}
// Run after React renders
setTimeout(initReveal,500);
// Also re-run on tab changes (MutationObserver)
const rootEl=document.getElementById('root');
if(rootEl){
  const mo=new MutationObserver(()=>setTimeout(initReveal,100));
  mo.observe(rootEl,{childList:true,subtree:true});
}
</script>
